experiment_name: "chignolin_baseline_test"
model_type: "transformer"

data:
  train_path:  "data/train.npz"
  val_path:    "data/valid.npz"
  test_path:   "data/test.npz"
  n_residues:  10
  augment_se3: false

diffusion:
  T:        50
  schedule: "cosine"

model:
  hidden_dim: 32
  n_heads:    2
  n_layers:   2
  time_dim:   32
  dropout:    0.1

training:
  batch_size:   8
  lr:           3.0e-4
  n_epochs:     5
  warmup_steps: 10
  grad_clip:    1.0
  ema_decay:    0.9999
  val_every:    1
  save_every:   5
  num_workers:  0

paths:
  checkpoint_dir: "checkpoints/baseline_test"